repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]

  - repo: local
    hooks:
      - id: no-duplicate-enums
        name: Check for duplicate GateRuleType enum values
        language: system
        entry: bash -c 'dupes=$(grep -n "= \"" src/pearl/models/enums.py | sort | uniq -d); if [ -n "$dupes" ]; then echo "Duplicate enum values found:"; echo "$dupes"; exit 1; fi'
        pass_filenames: false
        files: src/pearl/models/enums.py
