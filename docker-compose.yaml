services:
  pearl-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      PEARL_DATABASE_URL: postgresql+asyncpg://pearl:pearl@postgres:5432/pearl
      PEARL_REDIS_URL: redis://redis:6379/0
      PEARL_S3_ENDPOINT_URL: http://minio:9000
      PEARL_S3_ACCESS_KEY: minioadmin
      PEARL_S3_SECRET_KEY: minioadmin
      PEARL_S3_BUCKET: pearl-artifacts
      PEARL_JWT_SECRET: dev-secret-change-in-production
      PEARL_JWT_ALGORITHM: HS256
      PEARL_JWT_ISSUER: pearl-api
      PEARL_JWT_AUDIENCE: pearl
      PEARL_HOST: "0.0.0.0"
      PEARL_PORT: "8080"
      PEARL_PUBLIC_API_URL: "http://localhost:8080/api/v1"
      PEARL_SONAR_URL: "http://localhost:9090"
      PEARL_LOG_LEVEL: info
      PEARL_LOCAL_REVIEWER_MODE: "1"
      PEARL_MASS_URL: "http://host.docker.internal:80"
      PEARL_MASS_API_KEY: ""
      PEARL_LITELLM_API_URL: "http://litellm-litellm-1:4000"
      PEARL_LITELLM_API_KEY: "sk-litellm-local-testing"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - litellm
    volumes:
      - ./src:/app/src
      - ./PeaRL_spec:/app/PeaRL_spec

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pearl
      POSTGRES_PASSWORD: pearl
      POSTGRES_DB: pearl
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pearl"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5177:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    environment:
      - VITE_API_BASE_URL=http://pearl-api:8080
      - VITE_API_KEY=pearl-KYQXqnybaMaul7PoKJLsT4PZpZSFj0FIaVE2IPrQJNk
    depends_on:
      pearl-api:
        condition: service_started

  sonarqube:
    image: sonarqube:community
    hostname: sonarqube
    ports:
      - "9090:9000"   # 9000 is taken by minio; access SonarQube at localhost:9090
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: pearl
      SONAR_JDBC_PASSWORD: pearl
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli
    profiles:
      - scan   # only runs when explicitly invoked: docker compose run --rm sonar-scanner
    depends_on:
      sonarqube:
        condition: service_healthy
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}   # set in .env or pass on the command line
    volumes:
      - ${SCAN_DIR:-.}/:/usr/src   # override with: SCAN_DIR=/path/to/repo docker compose run --rm sonar-scanner

volumes:
  pgdata:
  miniodata:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  default:
    name: pearl_default
  litellm:
    external: true
    name: litellm_default
