# SonarQube project configuration
# Place this file at the root of any repo you want to scan with PeaRL.
# Run: docker compose run --rm -v "/path/to/repo:/usr/src" sonar-scanner

sonar.projectKey=saga-of-the-norsemen
sonar.projectName=Saga of the Norsemen
sonar.sources=src
sonar.exclusions=**/node_modules/**,**/.venv/**,**/dist/**,**/__pycache__/**
sonar.host.url=http://sonarqube:9000
# sonar.token is set via SONAR_TOKEN env var — do not commit the token here
